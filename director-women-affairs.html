                <h3>Introduction</h3>
                <p>The Office of the Director of Women Affairs in UDUF Africa plays an important role in promoting the participation, development, and empowerment of women within the organisation. The Director serves as the coordinator and representative of all female members and ensures that women are actively involved in leadership, entrepreneurship, and community service programmes.</p>
                <p>This orientation course is designed to guide the Director of Women Affairs on how to effectively carry out the responsibilities of the office and contribute to the growth of UDUF Africa.</p>
                <h3>Purpose of the Office</h3>
                <p>The purpose of the Office of Women Affairs is to promote the growth, inclusion, and empowerment of female members of the foundation. The office ensures that women are given opportunities to develop leadership skills, participate in programmes, and contribute to the vision of the organisation.</p>
                <p>The Director of Women Affairs helps create an environment where women feel respected, supported, and encouraged to grow personally and professionally.</p>

                <li>Promote active participation of women in UDUF Africa activities and programmes.</li>
                <li>Design programmes that support women leadership, entrepreneurship, and personal development.</li>
                <li>Serve as the voice of female members in executive discussions and planning.</li>
                <li>Encourage unity, inclusion, and cooperation among women in the organisation.</li>
                <li>Work with the Director of Programmes to ensure that women-focused initiatives are included in events.</li>
                <li>Organise mentorship, training, and empowerment sessions for female members.</li>
                <li>Support the recruitment and engagement of new female members.</li>
                <li>Promote the welfare, safety, and respect of women within the organisation.</li>
                <li>Submit activity reports to the Executive at agreed intervals.</li>
                <li>Perform any other duty assigned by the President, CEO, or Executive of UDUF Africa.</li></ul>
                <h3>Powers of the Director of Women Affairs</h3>
                <ul><li>Convene meetings of female members when necessary.</li>
                <li>Propose programmes or policies that will improve the participation and development of women.</li>
                <li>Recommend committees or volunteers to assist in women-related projects.</li>
                <li>Represent the organisation in women-focused programmes or partnerships when delegated.</li>
                <li>Advise the Executive on matters affecting female members.</li></ul>
                <h3>Leadership Expectations</h3>
                <p>The Director of Women Affairs must demonstrate strong leadership qualities, promote teamwork, cooperation, and respect among female members, encourage women to participate in leadership and organisational activities, inspire confidence, motivate women to develop their skills, and always act with integrity and responsibility.</p>

                <p>The Director should design programmes that promote women development in areas such as leadership, entrepreneurship, education, and community service. These programmes may include leadership workshops, business training sessions, mentoring programmes, and empowerment conferences. Such programmes help women build confidence and become more effective leaders.</p>

                <li><strong>Assistant Director of Media</strong></li>
                <li><strong>Director of Finance</strong></li>
                <li><strong>Director of Programmes</strong></li>
                <li><strong>Assistant Director of Programmes</strong></li>
                <li><strong>Director of Assets & Internal Affairs</strong></li>
                <li><strong>Assistant Director of Assets & Internal Affairs</strong></li>
                <li><strong>Director of Women Affairs</strong></li>
                <li><strong>Assistant Director of Women Affairs</strong></li></ol>
                <p>All executive and business meetings follow the <strong>parliamentary system</strong>.</p>
            </div>`
        },
        {
            title: "A Story About Leadership: Two Directors, Two Paths",
            content: `<div class="course-text">
                <div class="vision-mission">
                    <h3>A Story About Leadership: Two Directors, Two Paths</h3>
                    <p>There was once a time when two different women served as Director of Women Affairs in two different organisations. Both were educated and given the same opportunity to lead.</p>
                    <p>The first Director understood that leadership is service. She met regularly with female members, listened to their concerns, organised training programmes, and created mentorship opportunities. She worked with other leaders and encouraged women to grow in leadership and entrepreneurship. Because of her dedication, female participation increased and many women discovered their leadership potential. At the end of her tenure, she left the office with great honour, respect, and appreciation. Her leadership was remembered as a period of growth and unity.</p>
                    <p>The second Director followed another path. She rarely communicated with female members and did not organise programmes for their development. She focused more on personal recognition than service. Gradually the women became inactive and discouraged. By the end of her tenure, she left the office with disappointment and criticism.</p>
                    <p><strong>The lesson is simple.</strong> Leadership is not about position. Leadership is about responsibility and service. As the new Director of Women Affairs in UDUF Africa, you must choose the path of honour. Choose the path of dedication, service, unity, and empowerment. If you serve faithfully and build people, your leadership will also be remembered with honour.</p>
                </div>
            </div>`
        },
        {
            title: "Your Leadership Challenge",
            content: `<div class="course-text">
                <h3>Your Leadership Challenge</h3>
                <p>Every day as Director of Women Affairs is an opportunity to uplift, empower, and unite the women of UDUF Africa. Lead with purpose, serve with dedication, and build a legacy of growth and inclusion. Your work ensures that women are not just participants but leaders and change-makers in the organisation.</p>
                <p><strong>Motto to Remember:</strong><br>Get Inspired. Take Action. Transform Africa.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "What is the primary duty of the Director of Women Affairs?", options: ["Managing organisational finances", "Coordinating female members and promoting participation", "Supervising media activities", "Managing assets"], correct: 1 },
        { text: "The Director of Women Affairs represents who in executive discussions?", options: ["External organisations", "Male members", "Female members", "Government agencies"], correct: 2 },
        { text: "Which officer does the Director of Women Affairs collaborate with to include women initiatives in events?", options: ["Director of Finance", "Director of Media", "Director of Programmes", "Executive Secretary"], correct: 2 },
        { text: "Which of the following is one of the responsibilities of the Director of Women Affairs?", options: ["Auditing accounts", "Designing women empowerment programmes", "Supervising elections", "Managing assets"], correct: 1 },
        { text: "The Director of Women Affairs may organise meetings for:", options: ["Only executives", "Female members", "Government officials", "External partners"], correct: 1 },
        { text: "UDUF Africa was registered in which year?", options: ["2015", "2016", "2017", "2018"], correct: 2 },
        { text: "The mission of UDUF Africa includes which three key actions?", options: ["Build, Train, Empower", "Connect, Inspire, Transform", "Lead, Manage, Control", "Plan, Finance, Expand"], correct: 1 },
        { text: "Which of the following is NOT a focus area of UDUF Africa?", options: ["Entrepreneurship", "Leadership", "Community Service", "Aviation"], correct: 3 },
        { text: "The motto of UDUF Africa focuses on:", options: ["Youth leadership and community transformation", "Government administration", "Banking and finance", "Political campaigns"], correct: 0 },
        { text: "Blue in the UDUF Africa logo represents:", options: ["Agriculture", "Leadership and trust", "Wealth", "Politics"], correct: 1 },
        { text: "Orange in the UDUF Africa logo represents:", options: ["Discipline", "Energy and innovation", "Security", "Authority"], correct: 1 },
        { text: "Green in the UDUF Africa logo represents:", options: ["Government", "Growth and community service", "Competition", "Politics"], correct: 1 },
        { text: "The four human figures in the logo symbolise:", options: ["Political unity", "Collaboration and inclusiveness", "Government leadership", "Military strength"], correct: 1 },
        { text: "Which leadership system guides UDUF Africa meetings?", options: ["Military system", "Parliamentary system", "Judicial system", "Traditional system"], correct: 1 },
        { text: "One responsibility of the Director of Women Affairs is to:", options: ["Promote unity among female members", "Control government funds", "Supervise political campaigns", "Manage banking systems"], correct: 0 },
        { text: "Mentorship programmes help women to:", options: ["Reduce meetings", "Develop leadership and career skills", "Avoid responsibilities", "Replace training"], correct: 1 },
        { text: "The Director of Women Affairs should submit activity reports to:", options: ["Government agencies", "The Executive", "The public", "External donors"], correct: 1 },
        { text: "One lesson from the story of the two Directors is that:", options: ["Leadership is about popularity", "Leadership is about service and responsibility", "Leadership is about power", "Leadership is about wealth"], correct: 1 },
        { text: "The successful Director in the story succeeded because she:", options: ["Avoided meetings", "Focused on personal recognition", "Served members and organised programmes", "Ignored female members"], correct: 2 },
        { text: "A Director of Women Affairs who serves with dedication will leave office with:", options: ["Confusion", "Honour and respect", "Fear", "Opposition"], correct: 1 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Page functions (same pattern as previous pages)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Director of Women Affairs course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> Director of Women Affairs Knowledge Quiz</h3><p>Answer all 20 questions to complete the course. You need 70% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 70;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 70% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificate.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Director of Women Affairs Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase save/load
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_women_affairs`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "director_women_affairs",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_women_affairs`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_women_affairs`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_women_affairs`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User auth
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('director_women_affairs'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
