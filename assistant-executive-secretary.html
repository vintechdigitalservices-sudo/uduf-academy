                <h3>Introduction</h3>
                <p>The Assistant Executive Secretary plays a vital support role in UDUF Africa. This office ensures smooth administration, proper documentation, effective communication, and continuity of executive operations. While often working behind the scenes, the Assistant Executive Secretary is a backbone of organizational success.</p>
                <p>Your diligence determines how well meetings are recorded, projects tracked, and information shared. When you perform excellently, the entire foundation runs smoothly. When you neglect your duties, confusion follows.</p>
                <h3>Welcome to UDUF Africa</h3>
                <p>Dear Assistant Executive Secretary,</p>
                <p>Congratulations on your election. You now hold a role critical to connecting, organizing, and ensuring accountability within UDUF Africa. Your work directly impacts how smoothly the foundation operates and how effectively leaders and volunteers execute programmes.</p>
                <p>You serve as the backbone of the executive team, ensuring that decisions, programmes, and projects are well-documented, communicated, and followed up. Your role is pivotal for the success and continuity of every initiative.</p>

                <div class="vision-mission">
                    <h4><i class="fas fa-eye"></i> Vision</h4>
                    <p>To be a sought-after organisation that inspires Africa's new generation of ethical, community-focused servant leaders and entrepreneurs.</p>
                    <h4><i class="fas fa-bullseye"></i> Mission</h4>
                    <p>To <strong>CONNECT, INSPIRE, and TRANSFORM</strong> young people and communities across Africa:</p>

                <ul><li><strong>Entrepreneurship</strong> – Equipping young people with skills, mentorship, and resources to create sustainable businesses.</li>

        {
            title: "Five Pillars of Leadership",
            content: `<div class="course-text">
                <h3>Your Five Pillars of Leadership (Assistant Executive Secretary Edition)</h3>
                <div class="highlight-box"><h4>1. Documentation and Record Keeping</h4><p>Take accurate minutes of meetings. Maintain proper files for reports, correspondence, and decisions. Safely store documents and make them available when needed.</p><p><strong>Daily Reminder:</strong> Good records protect the organisation and guide future leaders.</p></div>
                <div class="highlight-box"><h4>2. Communication and Coordination</h4><p>Share meeting notices, resolutions, and updates promptly. Support the Executive Secretary in correspondence. Help coordinate executives, volunteers, and programmes.</p><p><strong>Daily Reminder:</strong> Clear communication keeps everyone aligned and productive.</p></div>
                <div class="highlight-box"><h4>3. Meeting Support and Administration</h4><p>Assist in preparing agendas and attendance registers. Ensure action points are documented and followed up. Support orderly conduct of meetings.</p><p><strong>Daily Reminder:</strong> Well-supported meetings lead to effective decisions.</p></div>
                <div class="highlight-box"><h4>4. Executive Support and Accountability</h4><p>Help track assigned responsibilities. Follow up on agreed actions. Support reporting to ensure transparency.</p><p><strong>Daily Reminder:</strong> Accountability turns plans into results.</p></div>
                <div class="highlight-box"><h4>5. Personal Discipline and Professionalism</h4><p>Be punctual, organised, respectful, and dependable. Maintain confidentiality. Represent UDUF Africa with integrity.</p><p><strong>Daily Reminder:</strong> Your character speaks louder than your position.</p></div>
            </div>`
        },
        {
            title: "Challenges & Your Leadership Challenge",
            content: `<div class="course-text">
                <h3>Common Challenges and How to Overcome Them</h3>
                <ul><li><strong>Poor Time Management:</strong> Use a planner, set reminders, and prioritise tasks daily.</li>
                <li><strong>Information Overload:</strong> Organise files digitally and physically. Label everything clearly.</li>
                <li><strong>Lack of Cooperation from Executives:</strong> Communicate politely, follow up professionally, and keep records of requests.</li>
                <li><strong>Forgetting Action Points:</strong> Maintain an action tracker and review it weekly.</li>
                <li><strong>Pressure and Burnout:</strong> Delegate when appropriate, rest properly, and ask for support.</li></ul>
                <h3>Your Leadership Challenge</h3>
                <p>Every message you send, every minute you write, and every document you keep contributes to UDUF Africa's legacy. Serve with diligence. Support your leaders. Protect institutional memory. Your excellence today builds tomorrow's success.</p>
                <p><strong>Motto to Remember:</strong><br>Get Inspired. Take Action. Transform Africa.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "What is the primary role of the Assistant Executive Secretary?", options: ["Managing finances", "Supporting administration, documentation, and communication", "Leading all programmes", "Representing UDUF Africa publicly only"], correct: 1 },
        { text: "True or False: Meeting minutes are optional if everyone remembers decisions.", options: ["True", "False"], correct: 1 },
        { text: "Which pillar focuses on keeping accurate records?", options: ["Communication", "Professionalism", "Documentation and Record Keeping", "Executive Support"], correct: 2 },
        { text: "Effective communication means:", options: ["Sending messages whenever convenient", "Sharing updates late", "Clear, timely, and organised information flow", "Only informing the President"], correct: 2 },
        { text: "True or False: Confidential documents can be shared casually.", options: ["True", "False"], correct: 1 },
        { text: "What helps track executive responsibilities?", options: ["Memory", "Verbal reminders only", "Action tracker and follow-up", "Waiting for reports"], correct: 2 },
        { text: "Professionalism includes:", options: ["Arriving late but apologizing", "Being organized, punctual, and respectful", "Ignoring emails", "Avoiding meetings"], correct: 1 },
        { text: "Which outcome reflects effective service?", options: ["Missing files and confusion", "Clear records, smooth meetings, and informed decisions", "Repeated discussions", "Disorganized handover"], correct: 1 },
        { text: "True or False: The Assistant Executive Secretary's work affects organisational continuity.", options: ["True", "False"], correct: 0 },
        { text: "A successful Assistant Executive Secretary is remembered for:", options: ["Popularity", "Silence", "Organization, reliability, and impact", "Title"], correct: 2 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Page functions (identical to previous)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Assistant Executive Secretary course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> Assistant Executive Secretary Knowledge Quiz</h3><p>Answer all questions correctly to complete the course. You need 70% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 70;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 70% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificate.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Assistant Executive Secretary Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase functions
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_assistant_executive_secretary`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "assistant_executive_secretary",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_assistant_executive_secretary`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_assistant_executive_secretary`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_assistant_executive_secretary`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User auth
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('assistant_executive_secretary'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
