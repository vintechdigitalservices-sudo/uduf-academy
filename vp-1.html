                <div class="highlight-box"><h4>1. Supervise Internal Coordination of Directors and Committees</h4><p>Maintain regular communication with all directors, ensure departments understand their roles, promote collaboration across units, prevent duplication and confusion.</p><p><strong>Daily Reminder:</strong> Coordination builds strength and unity.</p></div>
                <div class="highlight-box"><h4>2. Support the President in Implementing Executive Decisions</h4><p>Break decisions into actionable steps, assign responsibilities where necessary, follow up on implementation, keep records of decisions and progress.</p><p><strong>Daily Reminder:</strong> Leadership is proven through execution.</p></div>
                <div class="highlight-box"><h4>3. Monitor Performance of Departments and Follow Up on Tasks</h4><p>Track departmental activities and progress, ensure tasks are completed on time, identify delays and address them early, provide feedback and recommendations.</p><p><strong>Daily Reminder:</strong> What is tracked gets done.</p></div>
                <div class="highlight-box"><h4>4. Step in for the President When He or She is Absent</h4><p>Preside over meetings when necessary, lead with confidence and clarity, make decisions within your authority, maintain the President’s direction.</p><p><strong>Daily Reminder:</strong> Always be prepared to lead.</p></div>
                <div class="highlight-box"><h4>5. Handle Internal Conflict Resolution and Organisational Discipline Support</h4><p>Address conflicts fairly and calmly, promote unity and understanding, support enforcement of rules and policies, encourage respect and professionalism.</p><p><strong>Daily Reminder:</strong> Discipline sustains growth and unity.</p></div>
            </div>`
        },
        {
            title: "Operational Pillars, Leadership Challenge & Why Your Role Matters",
            content: `<div class="course-text">
                <h3>Your Five Operational Pillars as VP1</h3>
                <ul><li><strong>1. Structure</strong> – Build systems that support smooth operations</li>
                <li><strong>2. Accountability</strong> – Ensure everyone is responsible for their duties</li>
                <li><strong>3. Coordination</strong> – Align all departments towards common goals</li>
                <li><strong>4. Discipline</strong> – Maintain order and respect for organisational values</li>
                <li><strong>5. Execution</strong> – Ensure plans are completed effectively</li></ul>
                <h3>Your Leadership Challenge</h3>
                <p>Every day, you must ensure that UDUF Africa works effectively from within. Your impact will be seen in:</p>
                <ul><li>Smooth operations</li><li>Active departments</li><li>Completed tasks</li><li>Strong executive coordination</li></ul>
                <p>Your leadership is measured by results, not noise.</p>
                <h3>Why Your Role Matters</h3>
                <ul><li>You are the engine of internal coordination</li>
                <li>You ensure the President’s vision is implemented</li>
                <li>You prevent delays, confusion, and inefficiency</li>
                <li>You build a system that sustains long-term impact</li></ul>
            </div>`
        },
        {
            title: "Two Vice Presidents 1, Two Paths (Story)",
            content: `<div class="course-text">
                <div class="vision-mission">
                    <h3>Two Vice Presidents 1, Two Paths</h3>
                    <p>Once upon a time in UDUF Africa, two individuals were elected as Vice President 1 in different years. Both inherited the same platform, the same President, and the same opportunity to make a lasting difference.</p>
                    <p>The first Vice President 1, <strong>Chinedu</strong>, understood that his role was to support, complement, and strengthen the President’s leadership while ensuring strong internal coordination. He learned the constitution, supervised directors effectively, and ensured that all departments worked in alignment. He followed up on executive decisions, monitored performance, and made sure that every programme under his supervision ran smoothly.</p>
                    <p>He organised volunteer initiatives, ensured accountability across teams, and inspired members to give their best. When the President was unavailable, he stepped in confidently, led meetings with structure, and made sound decisions. He handled internal issues wisely, maintained discipline, and ensured unity within the organisation.</p>
                    <p>By the end of his term, the foundation had well-coordinated departments, thriving projects, an empowered executive team, and engaged volunteers. Chinedu handed over his office with pride, respected by all, and remembered for building a strong and efficient internal system.</p>
                    <p>The second Vice President 1, <strong>Amara</strong>, approached her office carelessly. She failed to coordinate directors, skipped follow-up on tasks, and ignored the implementation of executive decisions. Departments became disconnected, responsibilities were unclear, and projects suffered delays.</p>
                    <p>She avoided meetings, neglected internal structure, and failed to support the President effectively. When called upon to step in, she was unprepared and lacked direction. Conflicts were ignored, discipline weakened, and accountability disappeared.</p>
                    <p>By the end of her term, programmes had stalled, departments were disorganised, volunteers had lost motivation, and the executive structure had weakened. Her successors had to rebuild the system almost from the beginning. She handed over her office with little pride, leaving a legacy of confusion and missed opportunities.</p>
                    <p><strong>The Outcomes</strong><br>
                    Chinedu's path brought strong internal coordination, discipline, accountability, and lasting impact. His leadership strengthened the President's vision and ensured smooth organisational operations.<br>
                    Amara's path resulted in disorganisation, weak coordination, stalled projects, and frustration. Her negligence affected the entire system and slowed down progress.</p>
                    <p><strong>The Lesson</strong><br>
                    Being Vice President 1 is not about a title. It is about ensuring that the organisation works effectively from within. You are the backbone of internal coordination, the driver of accountability, and the support system of the President.<br>
                    Your diligence can strengthen the entire organisation, while negligence can weaken it.<br>
                    <strong>Choose the path of Chinedu.</strong><br>
                    Coordinate effectively. Follow up consistently. Maintain discipline. Support the President fully. Never be distracted by past failures. Focus on building a strong internal system and a lasting legacy of impact.</p>
                </div>
            </div>`
        },
        {
            title: "Final Charge & Quiz",
            content: `<div class="course-text">
                <h3>Final Charge</h3>
                <p>Serve with purpose.<br>
                Strengthen internal systems.<br>
                Ensure accountability.<br>
                Deliver results.</p>
                <p>As Vice President 1, choose the path of diligence, structure, and responsibility. Support the President fully, coordinate effectively, and ensure every task is completed.</p>
                <p>Do not allow disorder, delay, or negligence weaken the system. Build a legacy of excellence, discipline, and impact.</p>
                <p><strong>Motto to Remember:</strong> Get Inspired. Take Action. Transform Africa.</p>
                <p>Now, test your understanding with the quiz.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "What is the primary role of the Vice President 1?", options: ["Set the vision for UDUF Africa", "Ensure internal coordination and support the President", "Handle external partnerships only", "Lead all community projects"], correct: 1 },
        { text: "Which of the following is NOT a core focus area of UDUF Africa?", options: ["Leadership", "Volunteerism", "Real estate investment", "Entrepreneurship"], correct: 2 },
        { text: "What does the VP1 ensure when the President is absent?", options: ["Cancel all meetings", "Step in to lead with confidence and make decisions", "Delegate all work to members", "Focus only on financial matters"], correct: 1 },
        { text: "Which colour in the UDUF Africa logo represents stability and leadership?", options: ["Orange", "Green", "Blue", "Red"], correct: 2 },
        { text: "What is the key daily reminder for monitoring departments?", options: ["What is ignored gets done", "What is tracked gets done", "Meetings are optional", "Tasks will complete themselves"], correct: 1 },
        { text: "One of the Five Operational Pillars of VP1 is:", options: ["Expansion", "Coordination", "Negotiation", "Marketing"], correct: 1 },
        { text: "Why is discipline important for VP1?", options: ["To punish members", "To maintain order, respect, and organisational growth", "To avoid meetings", "To focus only on personal tasks"], correct: 1 },
        { text: "Which of the following is part of VP1’s duty in implementing executive decisions?", options: ["Attend meetings only", "Break decisions into actionable steps", "Ignore departmental delays", "Delegate without follow-up"], correct: 1 },
        { text: "What does the logo’s four interconnected human figures signify?", options: ["Business success", "Unity, collaboration, inclusivity, equal participation", "Financial stability", "Competition among members"], correct: 1 },
        { text: "Which statement reflects the lesson from the two Vice Presidents 1 story?", options: ["The title is more important than action", "Negligence has no lasting effect", "Diligence, coordination, and support build lasting impact", "Only the President matters"], correct: 2 },
        { text: "What is VP1’s role in conflict resolution?", options: ["Ignore conflicts to avoid stress", "Address conflicts fairly and calmly", "Punish volunteers publicly", "Focus only on finance"], correct: 1 },
        { text: "What should VP1 monitor regularly?", options: ["Personal schedule only", "Departmental activities, performance, and task completion", "External partnerships", "Political campaigns"], correct: 1 },
        { text: "Which is NOT a responsibility of VP1 in internal coordination?", options: ["Ensure departments understand their roles", "Promote collaboration", "Delegate work without follow-up", "Maintain communication with directors"], correct: 2 },
        { text: "What is the motto of UDUF Africa?", options: ["Build wealth, grow power", "Connecting youth leaders, shaping minds, transforming communities in Africa", "Lead first, follow later", "Serve yourself first"], correct: 1 },
        { text: "What is the slogan of UDUF Africa?", options: ["Lead, Follow, Repeat", "Get Inspired, Transform Africa", "Think Big, Win Big", "Discipline Above All"], correct: 1 },
        { text: "What is VP1’s responsibility regarding executive meetings?", options: ["Ensure meetings are structured, productive, and result-oriented", "Only attend when convenient", "Delegate meeting organisation to volunteers", "Avoid recording decisions"], correct: 0 },
        { text: "What happens when VP1 neglects duties, like Amara in the story?", options: ["Departments remain functional", "Projects stall, volunteers lose motivation, and organisation weakens", "Everything works automatically", "Only finances are affected"], correct: 1 },
        { text: "Which pillar ensures plans are completed effectively?", options: ["Coordination", "Execution", "Discipline", "Structure"], correct: 1 },
        { text: "Which of the following BEST describes VP1’s function?", options: ["External ambassador", "Backbone of internal coordination", "Solely responsible for finances", "Event organiser only"], correct: 1 },
        { text: "What is the final charge to Vice President 1?", options: ["Build personal wealth", "Serve with purpose, strengthen internal systems, ensure accountability, deliver results", "Focus only on volunteers", "Avoid responsibility"], correct: 1 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Helper functions (same pattern as previous pages)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Vice President 1 course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> Vice President 1 Knowledge Quiz</h3><p>Answer all 20 questions to complete the course. You need 80% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 80;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 80% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificates.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Vice President 1 Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase save/load
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_1`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "vice_president_1",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_1`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_1`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_1`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User authentication
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('vice_president_1'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
