    // Course pages – content split into logical sections
    const pages = [
        {
            title: "Course Introduction & DEI Overview",
            content: `<div class="course-text">
                <h3>COURSE INTRODUCTION</h3>
                <p>This course is designed to build the mindset and character of UDUF Africa members in the area of Diversity, Equity, and Inclusion (DEI). It teaches how to live, relate, lead, and serve in a way that respects people, promotes fairness, and creates opportunities for all.</p>
                <p>UDUF Africa’s vision is to inspire a new generation of ethical, community-focused servant leaders and entrepreneurs. This vision cannot be achieved without understanding people, respecting differences, and creating inclusive environments where everyone can grow.</p>
                <p>Our mission is to Connect, Inspire, and Transform, and DEI is a practical tool that makes this mission possible:</p>
                <ul><li>We connect people by bringing together individuals from different backgrounds</li>
                <li>We inspire people by promoting respect, dignity, and equal opportunity</li>
                <li>We transform communities by creating fair and inclusive systems</li></ul>
            </div>`
        },
        {
            title: "Understanding Diversity & Equity",
            content: `<div class="course-text">
                <h3>UNDERSTANDING DIVERSITY</h3>
                <p>Diversity means recognising that people are different in many ways. These differences include:</p>
                <ul><li>Culture and tribe</li><li>Religion and belief</li><li>Gender and age</li><li>Education and social background</li><li>Skills, talents, and experiences</li></ul>
                <p>Africa is one of the most diverse continents in the world. This diversity is a strength, not a weakness.</p>
                <p>When diversity is properly managed:</p>
                <ul><li>It improves creativity and innovation</li><li>It helps in better decision-making</li><li>It builds unity and understanding</li></ul>
                <p>However, when diversity is misunderstood, it can lead to division, conflict, and discrimination.</p>
                <p>UDUF Africa teaches members to:</p>
                <ul><li>Respect all people</li><li>Learn from differences</li><li>Build unity despite diversity</li></ul>
                <h3>UNDERSTANDING EQUITY</h3>
                <p>Equity means fairness and justice in how people are treated and supported.</p>
                <p>In real life, people do not start from the same position. Some may face challenges such as poverty, lack of education, or social barriers. Equity ensures that such people are given the support they need to succeed.</p>
                <p>Examples of equity include:</p>
                <ul><li>Giving scholarships to students who cannot afford education</li><li>Providing mentorship to those who lack guidance</li><li>Creating opportunities for underrepresented groups</li></ul>
                <p>UDUF Africa promotes equity by:</p>
                <ul><li>Providing training and capacity-building programmes</li><li>Creating platforms for equal participation</li><li>Supporting young people to grow regardless of their background</li></ul>
            </div>`
        },
        {
            title: "Understanding Inclusion & Addressing Bias",
            content: `<div class="course-text">
                <h3>UNDERSTANDING INCLUSION</h3>
                <p>Inclusion means creating an environment where everyone feels welcomed, respected, and valued.</p>
                <p>It is not enough to bring people together. We must ensure that everyone feels they belong and can contribute.</p>
                <p>An inclusive environment:</p>
                <ul><li>Listens to all voices</li><li>Respects different opinions</li><li>Encourages participation</li><li>Avoids discrimination</li></ul>
                <p>In UDUF Africa, inclusion means:</p>
                <ul><li>No one is ignored or sidelined</li><li>Every member has value</li><li>Everyone has the opportunity to grow</li></ul>
                <h3>BIAS, PREJUDICE, AND DISCRIMINATION</h3>
                <p>Bias is when we judge people unfairly based on assumptions.<br>
                Prejudice is a fixed negative opinion about a group of people.<br>
                Discrimination is the action of treating people unfairly because of those beliefs.</p>
                <p>Common examples include:</p>
                <ul><li>Tribalism</li><li>Gender inequality</li><li>Religious intolerance</li><li>Social class discrimination</li></ul>
                <p>These behaviours destroy unity and limit progress.</p>
                <p>As UDUF Africa members, we must:</p>
                <ul><li>Be aware of our biases</li><li>Avoid unfair judgement</li><li>Treat everyone with dignity</li><li>Promote fairness in all situations</li></ul>
            </div>`
        },
        {
            title: "DEI & UDUF Africa Objectives / Focus Areas",
            content: `<div class="course-text">
                <h3>DEI AND UDUF AFRICA OBJECTIVES</h3>
                <p>This course directly supports the objectives of UDUF Africa:</p>
                <ul><li><strong>Capacity Building:</strong> Members learn how to work with people and lead diverse teams</li>
                <li><strong>Strategic Connection:</strong> It encourages networking across different backgrounds</li>
                <li><strong>Social Development:</strong> It helps reduce social problems caused by discrimination</li>
                <li><strong>Partnership and Collaboration:</strong> It prepares members to work with organisations locally and internationally</li></ul>
                <h3>DEI AND UDUF AFRICA FOCUS AREAS</h3>
                <ul><li><strong>Leadership:</strong> Inclusive leadership builds trust, unity, and effectiveness. A good leader listens, respects, and makes fair decisions.</li>
                <li><strong>Entrepreneurship:</strong> Successful businesses serve different kinds of people. Inclusive entrepreneurs understand diverse customers and create opportunities for others.</li>
                <li><strong>Community Service:</strong> True service reaches everyone, especially the vulnerable and disadvantaged.</li>
                <li><strong>Volunteerism:</strong> Volunteerism teaches selfless service without bias or discrimination.</li></ul>
            </div>`
        },
        {
            title: "Practical Application & Personal Reflection",
            content: `<div class="course-text">
                <h3>PRACTICAL APPLICATION</h3>
                <p>As a member of UDUF Africa, you are expected to practise DEI daily:</p>
                <ul><li>Speak respectfully to everyone</li><li>Avoid tribal or religious bias</li><li>Give others equal chances</li><li>Support those who need help</li><li>Work peacefully with people from different backgrounds</li><li>Promote unity in your school, workplace, and community</li></ul>
                <h3>PERSONAL REFLECTION</h3>
                <p>Take time to reflect on the following:</p>
                <ol><li>What differences do I struggle to accept?</li>
                <li>Have I ever treated someone unfairly?</li>
                <li>How can I become more open-minded?</li>
                <li>What can I do to promote unity around me?</li>
                <li>How can I use my leadership position to support others?</li></ol>
                <div class="highlight-box">
                    <p><strong>FINAL TASK:</strong> Write a short personal commitment (5–10 lines) on how you will practise Diversity, Equity, and Inclusion as a member of UDUF Africa.</p>
                </div>
            </div>`
        },
        {
            title: "Conclusion & Quiz",
            content: `<div class="course-text">
                <h3>CONCLUSION</h3>
                <p>Diversity, Equity, and Inclusion are not just theories. They are principles that guide how we live, lead, and serve.</p>
                <p>They help UDUF Africa achieve its vision of raising ethical leaders, its mission of connecting and inspiring people, and its goal of transforming communities across Africa.</p>
                <p>When you practise DEI:</p>
                <ul><li>You become a better leader</li><li>You build stronger relationships</li><li>You create more opportunities</li><li>You contribute to a better society</li></ul>
                <p>Now, test your understanding with the quiz.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "What does Diversity mean?", options: ["People being the same", "Presence of differences among people", "Separation of people", "Ignoring differences"], correct: 1 },
        { text: "Equity means:", options: ["Treating everyone the same", "Giving everyone equal money", "Fairness based on individual needs", "Ignoring people’s needs"], correct: 2 },
        { text: "Inclusion means:", options: ["Excluding some people", "Making people feel unwelcome", "Ensuring everyone feels valued and included", "Giving power to only a few"], correct: 2 },
        { text: "Which of the following is an example of diversity?", options: ["Everyone having the same background", "People from different tribes and religions", "Only one type of person in a group", "Avoiding differences"], correct: 1 },
        { text: "Bias is best described as:", options: ["Fair judgement", "Equal treatment", "Unfair judgement based on assumptions", "Respect for others"], correct: 2 },
        { text: "Which of the following supports equity?", options: ["Giving the same resources to everyone", "Ignoring disadvantaged people", "Providing extra support to those in need", "Favouring only your friends"], correct: 2 },
        { text: "An inclusive leader is someone who:", options: ["Ignores others’ opinions", "Makes decisions alone", "Listens and respects different views", "Discriminates against others"], correct: 2 },
        { text: "Which of these is NOT part of UDUF Africa’s focus areas?", options: ["Leadership", "Entrepreneurship", "Community Service", "Entertainment"], correct: 3 },
        { text: "Discrimination means:", options: ["Treating people equally", "Treating people unfairly based on differences", "Supporting everyone", "Encouraging unity"], correct: 1 },
        { text: "DEI helps UDUF Africa to:", options: ["Divide people", "Promote unfairness", "Connect, Inspire, and Transform communities", "Focus only on business"], correct: 2 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Helper functions (same pattern as previous)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Diversity, Equity & Inclusion course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> DEI Knowledge Quiz</h3><p>Answer all questions to complete the course. You need 70% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 70;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 70% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificate.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Diversity, Equity & Inclusion Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase save/load
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_dei_course`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "dei_course",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_dei_course`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_dei_course`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_dei_course`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User authentication
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('dei_course'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
