                <h3>Welcome to UDUF Africa</h3>
                <p>Dear President,</p>
                <p>Congratulations on your election as President of Ultimate Destiny Uplifters Foundation (UDUF Africa). You now lead a movement dedicated to helping people rise above mediocrity, actualize their aspirations, and fulfill their destiny.</p>
                <p>The President of UDUF Africa holds the highest elected executive office and serves as the primary leader responsible for guiding the organization towards its vision and mission. This role requires a combination of strategic thinking, effective leadership, and strong decision-making skills.</p>
                <p>The <strong>President's training module</strong> is designed to equip the officeholder with the knowledge, tools, and practical skills needed to lead the executive team effectively, inspire members, represent UDUF Africa externally, and ensure accountability to the Board of Directors.</p>
                <p>Through a combination of interactive sessions, practical exercises, and case studies, the training focuses on key areas such as vision and goal setting, meeting leadership, decision-making, public representation, and executive accountability. By completing this training, the President will be well-prepared to drive UDUF Africa's programmes, foster teamwork, and uphold the organization's standards of excellence and community impact.</p>

            content: `<div class="course-text">

                    <p>To <strong>CONNECT, INSPIRE, and TRANSFORM</strong> young people and communities across Africa:</p>

                    <p>Once upon a time in a vibrant youth-led foundation, two individuals were elected as Presidents in different years. Both inherited the same platform, the same vision, and the same opportunity to make a lasting difference.</p>

                    <p>The second President, <strong>Tunde</strong>, approached leadership differently. He ignored the constitution, skipped meetings, and left programmes half-finished. He focused on appearances rather than action, seldom consulted his team, and avoided responsibility. By the end of his term, projects had failed, volunteers had disengaged, and the foundation's progress had stalled. When Tunde handed over to the next President, there were no reports, no clear direction, and nothing of substance to show for his tenure. He left without pride, and many quietly wondered if the foundation could recover.</p>
                    <p><strong>The Outcomes:</strong></p>
                    <ul><li>Amaka's path brought respect, growth, and lasting impact. Her work inspired others to serve selflessly and lead responsibly.</li>
                    <li>Tunde's path left disappointment, disengagement, and wasted opportunities. His carelessness became a cautionary tale.</li></ul>
                    <p><strong>The Lesson:</strong> Leadership is not about the title or the power it gives you. It is about what you build, whom you impact, and the integrity you maintain while in office. Every President has a choice: to be remembered for impact or for negligence. As a leader, choose the path of Amaka. Serve diligently, inspire your team, leave projects better than you found them, and hand over a legacy of pride. Never glance at the path of Tunde—his way leads nowhere, and looking back will only distract you from building a future that matters.</p>
                    <p><em>Lead with purpose. Make an impact. Transform lives. That is the mark of a true President.</em></p>
                </div>
            </div>`
        },
        {
            title: "Five Pillars of Leadership (President)",
            content: `<div class="course-text">
                <h3>A Message to Our New President: Your Five Pillars of Leadership</h3>
                <p>Dear President, as you step into this vital role, you hold not just a title, but a tremendous opportunity to shape the future of UDUF Africa and inspire a generation of young leaders. Your success depends on mastering five critical areas of leadership:</p>
                <div class="highlight-box"><h4>1. Goal Setting</h4><p>Define clear, measurable, and achievable objectives for the foundation. Set priorities for short-term wins and long-term impact. Inspire your team by communicating a compelling vision and motivating everyone to work toward it.</p><p><strong>Daily Reminder:</strong> Goals turn vision into action. Lead with clarity and purpose.</p></div>
                <div class="highlight-box"><h4>2. Meeting Leadership</h4><p>Prepare structured agendas that focus on outcomes, not just discussion. Encourage participation, listen actively, and facilitate collaboration. Ensure meetings produce actionable decisions and assign responsibilities.</p><p><strong>Daily Reminder:</strong> A well-led meeting inspires ideas, accountability, and action.</p></div>
                <div class="highlight-box"><h4>3. Decision-Making</h4><p>Gather facts, consult your executives, and weigh options carefully. Be bold, timely, and ethical in every choice you make. Learn from both successes and mistakes to improve future decisions.</p><p><strong>Daily Reminder:</strong> Every decision shapes UDUF Africa's legacy—choose wisely and with integrity.</p></div>
                <div class="highlight-box"><h4>4. Public Representation</h4><p>Be the face of UDUF Africa in communities, events, media, and partnerships. Speak with confidence, authenticity, and alignment to the foundation's mission. Build networks, attract support, and strengthen trust in the organisation.</p><p><strong>Daily Reminder:</strong> How you represent UDUF Africa inspires confidence and opens doors for impact.</p></div>
                <div class="highlight-box"><h4>5. Executive Accountability</h4><p>Lead by example: be transparent, reliable, and responsible. Track progress on projects, follow up with executives, and maintain proper reports. Encourage a culture of integrity, discipline, and commitment among your team.</p><p><strong>Daily Reminder:</strong> Accountability is the cornerstone of trust, respect, and lasting impact.</p></div>
            </div>`
        },
        {
            title: "Your Leadership Challenge",
            content: `<div class="course-text">
                <h3>Your Leadership Challenge</h3>
                <p>Every day as President is an opportunity to <strong>connect, inspire, and transform</strong>. Your actions define your legacy and the future of UDUF Africa. Lead with purpose, serve selflessly, and empower every member to make a difference.</p>
                <p><strong>Motto to Remember:</strong><br>Get Inspired. Take Action. Transform Africa.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "Which of the following is the primary responsibility of the President of UDUF Africa?", options: ["Managing only the finance of the foundation", "Leading, inspiring, and creating impact through executive actions", "Attending all social events personally", "Supervising only the volunteers"], correct: 1 },
        { text: "True or False: The President should ignore the constitution and make decisions based on personal preference.", options: ["True", "False"], correct: 1 },
        { text: "Which of the following pillars ensures that the President sets a clear vision and motivates the team to achieve it?", options: ["Public Representation", "Executive Accountability", "Goal Setting", "Meeting Leadership"], correct: 2 },
        { text: "Effective meeting leadership involves:", options: ["Preparing an agenda, encouraging participation, and ensuring actionable outcomes", "Allowing discussions to go on without direction", "Speaking for everyone and not listening", "Cancelling meetings frequently"], correct: 0 },
        { text: "True or False: Public representation is only about attending events and giving speeches.", options: ["True", "False"], correct: 1 },
        { text: "Executive accountability includes:", options: ["Delegating tasks and never checking on progress", "Maintaining transparency, following up on projects, and leading by example", "Avoiding responsibility for project failures", "Ignoring reports and documentation"], correct: 1 },
        { text: "Decision-making as a President should be:", options: ["Informed, ethical, timely, and consultative", "Hasty and based on personal preference", "Ignored until someone reminds the President", "Done secretly without informing the team"], correct: 0 },
        { text: "Which of the following best describes the impact of a President who leads effectively?", options: ["Disengaged members and failed programmes", "Strong legacy, respected executives, and thriving community projects", "Confusion among team members", "Ignored responsibilities and unfinished reports"], correct: 1 },
        { text: "True or False: A President should focus on building relationships and networks as part of public representation.", options: ["True", "False"], correct: 0 },
        { text: "Which of these statements is correct regarding a President's leadership legacy?", options: ["Legacy is defined by the title alone", "Legacy is measured by impact, integrity, and the lives touched", "Legacy depends on popularity only", "Legacy is irrelevant to future executives"], correct: 1 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Helper functions
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the President course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> President Knowledge Quiz</h3><p>Answer all questions correctly to complete the course. You need 70% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 70;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 70% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }
    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificate.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>President Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_president`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "executive_president",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_president`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_president`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_president`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User authentication (email modal)
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('executive_president'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    // Updated logout: clear session and go to index.html
    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
