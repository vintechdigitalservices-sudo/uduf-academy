                <p>The Vice President 2 (Programmes and External Engagement) holds a strategic leadership position within UDUF Africa. As the second-in-command with a focus on programmes and outward impact, you are a key partner to the President in driving initiatives that extend the organisation’s influence beyond its internal structure.</p>
                <p>This role requires vision, coordination skills, relationship-building, and the ability to translate plans into action. While the President provides overall direction, you ensure that programmes, events, and external engagements are executed successfully and that the foundation’s impact is visible across communities and partners.</p>
                <p>The Vice President 2 training course equips you with practical tools to supervise programme delivery, manage external partnerships, represent the organisation effectively, and maintain strong connections with stakeholders.</p>

                <div class="highlight-box"><h4>3. Assist the Director of Programmes in Ensuring Successful Delivery of Projects</h4><p>Monitor milestones, support teams, provide feedback, and ensure quality and impact.</p><p><strong>Daily Reminder:</strong> Support ensures success.</p></div>
                <div class="highlight-box"><h4>4. Represent the Organisation in External Meetings When Delegated</h4><p>Attend meetings with confidence, communicate the foundation’s vision, build credibility, and report outcomes.</p><p><strong>Daily Reminder:</strong> Representation reflects the organisation’s integrity.</p></div>
                <div class="highlight-box"><h4>5. Promote Visibility and Growth Opportunities for the Foundation</h4><p>Highlight programmes, identify growth opportunities, support campaigns, and encourage member participation.</p><p><strong>Daily Reminder:</strong> Visibility creates opportunities.</p></div>
            </div>`
        },
        {
            title: "Five Operational Pillars & Leadership Challenge",
            content: `<div class="course-text">
                <h3>Your Five Operational Pillars as VP2</h3>
                <ul><li><strong>1. Planning</strong> – Ensure programmes are well-organised and goal-oriented</li>
                <li><strong>2. Execution</strong> – Implement programmes and events effectively</li>
                <li><strong>3. Collaboration</strong> – Build partnerships and strengthen networks</li>
                <li><strong>4. Representation</strong> – Uphold the foundation’s credibility externally</li>
                <li><strong>5. Impact</strong> – Measure and promote programmes for maximum results</li></ul>
                <h3>Your Leadership Challenge</h3>
                <p>Every day, you must ensure that UDUF Africa’s programmes, events, and external partnerships reflect excellence and drive impact. Your leadership will be seen in:</p>
                <ul><li>Successful programmes and events</li>
                <li>Strong and credible partnerships</li>
                <li>Positive external visibility</li>
                <li>Measurable community and societal impact</li></ul>
                <p>Your leadership is measured by outcomes and influence, not effort alone.</p>
            </div>`
        },
        {
            title: "Two Vice Presidents 2, Two Paths (Story)",
            content: `<div class="course-text">
                <div class="vision-mission">
                    <h3>Two Vice Presidents 2, Two Paths</h3>
                    <p>Once upon a time in UDUF Africa, two individuals were elected as Vice President 2 in different years. Both inherited the same platform, the same President, and the same opportunity to make a lasting difference.</p>
                    <p>The first Vice President 2, <strong>Ada</strong>, understood that her role was to support the President while driving programmes and external engagements. She coordinated events, strengthened partnerships, and ensured that projects delivered impact. She represented the organisation professionally, promoted visibility, and inspired stakeholders and volunteers to contribute meaningfully.</p>
                    <p>By the end of her term, the foundation had thriving programmes, strong collaborations, increased visibility, and lasting external impact. Ada handed over her office with pride, respected by all, and remembered for expanding UDUF Africa’s reach.</p>
                    <p>The second Vice President 2, <strong>Tunde</strong>, approached his office carelessly. He ignored planning, failed to coordinate events, neglected partnerships, and mismanaged representation externally. Programs stalled, collaborations weakened, and the foundation’s visibility declined.</p>
                    <p>By the end of his term, projects had failed to deliver impact, stakeholders lost trust, and successors had to rebuild credibility and external networks. He handed over his office with little pride, leaving a legacy of missed opportunities.</p>
                    <p><strong>The Outcomes</strong><br>
                    Ada's path brought strong programmes, effective partnerships, and visible impact. Her leadership strengthened the President's vision and extended the foundation’s influence.<br>
                    Tunde's path led to weak programmes, failed collaborations, and poor visibility. Negligence affected the foundation’s external reputation and slowed progress.</p>
                    <p><strong>The Lesson</strong><br>
                    Being Vice President 2 is not about a title. It is about ensuring that UDUF Africa’s programmes succeed, partnerships thrive, and external impact is visible. You are the driver of outward engagement and a key support to the President.<br>
                    Your diligence can expand the foundation’s influence, while negligence can weaken it.<br>
                    <strong>Choose the path of Ada.</strong><br>
                    Coordinate programmes effectively. Engage partners consistently. Represent the foundation with integrity. Support the President fully. Never be distracted by past failures. Focus on building lasting external impact.</p>
                </div>
            </div>`
        },
        {
            title: "Final Charge & Quiz",
            content: `<div class="course-text">
                <h3>Final Charge</h3>
                <p>Serve with purpose.<br>
                Strengthen programmes and partnerships.<br>
                Promote visibility and external influence.<br>
                Deliver results.</p>
                <p>As Vice President 2, choose diligence, vision, and responsibility. Support the President fully, drive programmes effectively, and represent the foundation with credibility.</p>
                <p><strong>Motto to Remember:</strong> Get Inspired. Take Action. Transform Africa.</p>
                <p>Now, test your understanding with the quiz.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "What is the primary focus of Vice President 2?", options: ["Internal coordination and discipline", "Programmes, partnerships, and external impact", "Financial management and budgeting", "Assets and internal affairs"], correct: 1 },
        { text: "Which of the following is a key duty of VP2?", options: ["Supervise internal meetings", "Monitor departmental tasks", "Support planning and execution of programmes and events", "Handle organisational discipline"], correct: 2 },
        { text: "VP2 assists which director to ensure successful delivery of projects?", options: ["Director of Finance", "Director of Programmes", "Director of Media", "Director of Assets & Internal Affairs"], correct: 1 },
        { text: "How should VP2 represent UDUF Africa in external meetings?", options: ["With professionalism and clarity", "By delegating responsibility to volunteers", "Without reporting back to the President", "Only when convenient"], correct: 0 },
        { text: "What does VP2 do to promote the foundation’s growth and visibility?", options: ["Monitor internal departmental performance", "Highlight programmes, identify partnerships, and support outreach initiatives", "Enforce internal discipline", "Manage financial records"], correct: 1 },
        { text: "Which of these is NOT a pillar of VP2’s role?", options: ["Planning", "Execution", "Coordination", "Asset management"], correct: 3 },
        { text: "Why is external engagement important for VP2?", options: ["It ensures internal meetings run smoothly", "It extends UDUF Africa’s influence and strengthens partnerships", "It reduces the President’s workload completely", "It manages volunteers’ personal growth"], correct: 1 },
        { text: "What lesson does the story of Ada (successful VP2) teach?", options: ["Neglecting tasks has no impact", "Diligence in programmes and partnerships leads to visible results and lasting impact", "Only internal systems matter", "External meetings are optional"], correct: 1 },
        { text: "When the President delegates representation to VP2, what is expected?", options: ["Attend meetings confidently, communicate clearly, and report back", "Only attend if the meeting is small", "Pass responsibility to another director", "Avoid building new partnerships"], correct: 0 },
        { text: "Which of the following best summarises the VP2’s final charge?", options: ["Focus on discipline and internal operations", "Drive programmes, partnerships, visibility, and external impact", "Limit external engagements and focus on internal reports", "Only monitor volunteers’ attendance"], correct: 1 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Helper functions (same pattern as previous pages)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Vice President 2 course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> Vice President 2 Knowledge Quiz</h3><p>Answer all questions to complete the course. You need 80% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 80;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 80% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificates.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Vice President 2 Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase save/load
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_2`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "vice_president_2",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_2`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_2`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_vice_president_2`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User authentication
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('vice_president_2'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
