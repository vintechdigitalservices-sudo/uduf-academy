<script>

    // Vice President course content (split into pages) – unchanged
    const pages = [
        {
            title: "Introduction & Role",
            content: `<div class="course-text"><h3>Introduction</h3><p>The Vice President of UDUF Africa holds the second-highest elected executive office and serves as a key partner to the President. This role requires strategic thinking, effective leadership, coordination skills, and the ability to support and complement the President in achieving the organization's vision and mission.</p><p>The Vice President's training module equips the officeholder with knowledge, tools, and practical skills to assist the President, lead assigned programmes, inspire members, oversee volunteer engagement, and ensure executive accountability. Training covers key areas such as supporting goal setting, meeting facilitation, decision-making, public representation, and team accountability.</p><h3>Welcome to UDUF Africa</h3><p>Dear Vice President,</p><p>Congratulations on your election as Vice President of Ultimate Destiny Uplifters Foundation (UDUF Africa). You now serve a movement dedicated to helping young Africans rise above mediocrity, realise their aspirations, and fulfil their destiny.</p><h3>Role of the Vice President</h3><ul><li>Support the President in leading UDUF Africa and executing the vision.</li><li>Oversee assigned programmes, ensuring they align with the foundation's goals.</li><li>Lead initiatives in the absence of the President.</li><li>Foster executive team coordination, volunteer engagement, and effective decision-making.</li><li>Provide mentorship and guidance to members and volunteers.</li></ul></div>`
        },
        {
            title: "About UDUF Africa",
            content: `<div class="course-text"><h3>About UDUF Africa</h3><p>UDUF Africa is a platform that provides <strong>capacity-building opportunities</strong> to young leaders, entrepreneurs, politicians, traditional rulers, religious leaders, and student leaders who are committed to selfless service and the transformation of African communities.</p><p>We are <strong>legally registered</strong> in Nigeria with the Corporate Affairs Commission (CAC), Reg. No CAC/IT/NO 103111 (15th November 2017).</p><div class="vision-mission"><h4><i class="fas fa-eye"></i> Vision</h4><p>To be a sought-after organisation that inspires Africa's new generation of ethical, community-focused servant leaders and entrepreneurs.</p><h4><i class="fas fa-bullseye"></i> Mission</h4><p>To <strong>CONNECT, INSPIRE, and TRANSFORM</strong> young people and communities across Africa:</p><ul><li><strong>CONNECT:</strong> Facilitate networking among young people across cultures, religions, and political beliefs.</li><li><strong>INSPIRE:</strong> Encourage responsible action and personal, professional, and societal growth.</li><li><strong>TRANSFORM:</strong> Lead activities that positively impact communities across Africa.</li></ul></div><h3>Core Focus Areas</h3><ul><li><strong>Entrepreneurship</strong> – Equipping young people with skills, mentorship, and resources to create sustainable businesses.</li><li><strong>Leadership</strong> – Nurturing ethical, visionary, and servant leaders for political, business, and social impact.</li><li><strong>Community Service</strong> – Engaging youth in projects that solve real-life challenges in communities.</li><li><strong>Volunteerism</strong> – Offering platforms for meaningful service, personal growth, and social impact.</li></ul><p><strong>Motto:</strong> Connecting youth leaders, shaping minds, transforming communities in Africa.<br><strong>Slogan:</strong> Get Inspired, Transform Africa.</p><h3>Faith and Values</h3><p>We believe in God, human potential, and selfless service. We commit resources, time, and talent to uplift communities, develop leaders, and make Africa better.</p><h3>Logo Meaning</h3><ul><li><strong style="color:#1e3c72;">Blue</strong> – Stability, trust, leadership</li><li><strong style="color:#f39c12;">Orange</strong> – Energy, innovation, enthusiasm</li><li><strong style="color:#27ae60;">Green</strong> – Growth, transformation, community service</li><li><strong>Four interconnected human figures</strong> – Unity, collaboration, inclusivity, equal participation</li></ul><h3>Why You Lead UDUF Africa</h3><ul><li>You guide a recognised, credible organisation committed to youth development and community transformation.</li><li>You inspire, empower, and create opportunities for impact.</li><li>You uphold ethical leadership, financial stewardship, and strategic vision.</li><li>You influence Africa's future by connecting young leaders with purpose and opportunity.</li></ul></div>`
        },
        {
            title: "Executive Structure & Message",
            content: `<div class="course-text"><h3>Executive Structure</h3><ol><li>Founder & Chairman, Board of Directors</li><li>Chief Executive Officer (Non-elected)</li><li><strong>President</strong></li><li><strong>Vice President</strong></li><li>Executive Secretary</li><li>Assistant Executive Secretary</li><li>Director of Media</li><li>Assistant Director of Media</li><li>Director of Finance</li><li>Director of Programmes</li><li>Assistant Director of Programmes</li><li>Director of Assets & Internal Affairs</li><li>Assistant Director of Assets & Internal Affairs</li></ol><p>All executive and business meetings follow the <strong>parliamentary system</strong>.</p><h3>Message to You, Vice President</h3><p>Your leadership role is pivotal. As Vice President, you will <strong>connect, inspire, and transform</strong>. You are the torchbearer for our vision, leading by example, empowering members, and ensuring UDUF Africa delivers on its mission of creating young servant leaders and entrepreneurs who impact Africa positively.</p><p><strong>Get inspired. Take action. Transform Africa.</strong></p></div>`
        },
        {
            title: "Two Vice Presidents, Two Paths (Story)",
            content: `<div class="course-text"><div class="vision-mission"><h3>Two Vice Presidents, Two Paths</h3><p>Once upon a time in UDUF Africa, two individuals were elected as Vice President in different years. Both inherited the same platform, the same President, and the same opportunity to make a lasting difference.</p><p>The first Vice President, <strong>Chinedu</strong>, understood that his role was to support, complement, and strengthen the President's leadership. He learned the constitution, coordinated effectively with the executive team, and ensured every programme under his supervision ran smoothly. He organised volunteer initiatives, followed up on projects, and inspired members to give their best. When the President was unavailable, he led meetings confidently and made sound decisions. By the end of his term, the foundation had thriving projects, an empowered executive team, and engaged volunteers. Chinedu handed over his office with pride, respected by all, and remembered for the positive difference he made.</p><p>The second Vice President, <strong>Amara</strong>, approached her office carelessly. She avoided responsibilities, skipped coordination meetings, and failed to support the President. She ignored volunteers and left projects incomplete. When the President relied on her, she was unprepared and disengaged. By the end of her term, programmes had stalled, volunteers had lost motivation, and her successors had to start almost from scratch. She handed over her office with little pride, leaving a legacy of confusion and missed opportunities.</p><p><strong>The Outcomes:</strong></p><ul><li>Chinedu's path brought respect, strong executive coordination, and lasting impact. His work strengthened the President's vision and inspired members to serve and lead responsibly.</li><li>Amara's path left disengagement, stalled projects, and frustration. Her carelessness became a cautionary tale for future leaders.</li></ul><p><strong>The Lesson:</strong> Being Vice President is not about a title—it is about supporting the President, empowering your team, and ensuring continuity of impact. You are the bridge between the President and the members. Your diligence can elevate the foundation, while negligence can undermine it.</p><p>As a Vice President, <strong>choose the path of Chinedu</strong>. Lead with commitment, coordinate effectively, inspire volunteers, and support the President fully. Never be distracted by the failures of those before you—focus on building a strong legacy of impact.</p><p><em>Serve with purpose. Strengthen leadership. Transform lives. That is the mark of a true Vice President.</em></p></div></div>`

        {
            title: "Five Pillars of Leadership (Vice President)",
            content: `<div class="course-text"><h3>Your Five Pillars of Leadership (Vice President Edition)</h3><div class="highlight-box"><h4>1. Supporting Goal Setting</h4><p>Assist the President in defining objectives and tracking progress. Ensure that short-term wins align with long-term impact. Inspire the team by promoting a clear vision in every project.</p><p><strong>Daily Reminder:</strong> Goals guide action. Support clarity, stay aligned, and lead by example.</p></div><div class="highlight-box"><h4>2. Meeting Leadership</h4><p>Facilitate meetings when the President is unavailable. Encourage participation, ensure agendas are followed, and outcomes assigned. Monitor discussions to maintain focus on actionable results.</p><p><strong>Daily Reminder:</strong> Well-led meetings create accountability, action, and momentum.</p></div><div class="highlight-box"><h4>3. Decision-Making Support</h4><p>Provide counsel to the President and executive team on major decisions. Analyse options, consider impact, and contribute to ethical, timely resolutions. Take initiative in delegated responsibilities and lead assigned projects with confidence.</p><p><strong>Daily Reminder:</strong> Your support and insight strengthen every decision made.</p></div><div class="highlight-box"><h4>4. Public Representation</h4><p>Represent UDUF Africa at events, networks, and community initiatives. Build relationships with partners, sponsors, and stakeholders. Promote the foundation's mission with integrity and professionalism.</p><p><strong>Daily Reminder:</strong> Every interaction shapes the foundation's reputation.</p></div><div class="highlight-box"><h4>5. Executive Accountability</h4><p>Ensure projects and programmes are executed effectively. Track progress, maintain reports, and provide feedback to the President. Uphold transparency, discipline, and commitment across all initiatives.</p><p><strong>Daily Reminder:</strong> Accountability empowers trust, inspires the team, and ensures impact.</p></div></div>`
        },
        {
            title: "Your Leadership Challenge & Why Your Role Matters",
            content: `<div class="course-text"><h3>Your Leadership Challenge</h3><p>Every day as Vice President is an opportunity to support, lead, and inspire. Your actions define UDUF Africa's progress, complement the President's vision, and strengthen the foundation's impact. Lead with diligence, encourage your team, and ensure every project is meaningful and sustainable.</p><p><strong>Motto to Remember:</strong><br>Get Inspired. Take Action. Transform Africa.</p><h3>Why Your Role Matters</h3><ul><li>You are the backbone of executive coordination and continuity.</li><li>You amplify the President's vision while providing guidance and oversight.</li><li>You shape Africa's future through your leadership, mentorship, and service.</li><li>You create an environment where members and volunteers thrive, innovate, and impact communities.</li></ul></div>`
        }
    ];

    const quizQuestions = [
        { text: "Which of the following best describes the primary responsibility of the Vice President?", options: ["Replacing the President only during absence", "Supporting the President, leading programmes, and inspiring the executive team", "Managing the foundation's social media exclusively", "Handling finances alone"], correct: 1 },
        { text: "True or False: The Vice President should act independently and ignore the President's guidance.", options: ["True", "False"], correct: 1 },
        { text: "Which pillar ensures the Vice President helps achieve the foundation's vision?", options: ["Executive Accountability", "Decision-Making Support", "Volunteer Recruitment", "Public Representation"], correct: 1 },
        { text: "Effective meeting leadership as Vice President involves:", options: ["Following the agenda, encouraging discussion, and assigning actionable tasks", "Speaking for everyone and disregarding opinions", "Canceling meetings at will", "Leaving decisions for the President only"], correct: 0 },
        { text: "True or False: The Vice President can represent UDUF Africa externally, building networks and partnerships.", options: ["True", "False"], correct: 0 },
        { text: "Executive accountability includes:", options: ["Following up on projects, mentoring team members, and maintaining transparency", "Ignoring incomplete projects", "Avoiding delegated responsibilities", "Delegating without oversight"], correct: 0 },
        { text: "Decision-making support should be:", options: ["Timely, informed, ethical, and consultative", "Based only on personal preference", "Ignored until instructed", "Done secretly"], correct: 0 },
        { text: "Which statement best describes a Vice President who leads effectively?", options: ["Disengaged volunteers and failed programmes", "Respected, coordinated executive team, and impactful projects", "Confusion and mismanagement", "Lack of direction and incomplete projects"], correct: 1 },
        { text: "True or False: Supporting the President in public representation enhances UDUF Africa's credibility and impact.", options: ["True", "False"], correct: 0 },
        { text: "What defines a Vice President's successful legacy?", options: ["Popularity among members", "Impact, guidance, and support for the President", "Holding office for a long time", "Completing personal projects only"], correct: 1 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Load page content (same as before)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Vice President course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> Vice President Knowledge Quiz</h3><p>Answer all questions correctly to complete the course. You need 70% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 70;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 70% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificate.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Vice President Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase save/load (unchanged)
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_vice_president`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "executive_vice_president",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_vice_president`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_vice_president`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_executive_vice_president`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User authentication
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('executive_vice_president'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    // Updated logout: clear session and go to index.html
    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
