                    <h3>Two Directors, Two Paths</h3>
                    <p>Once upon a time in UDUF Africa, two people served as Director of Assets & Internal Affairs in different years.</p>
                    <p>The first Director, <strong>Ibrahim</strong>, understood that his office was about protection, organisation, and continuity. He created an asset register, labelled equipment, monitored usage, and ensured everything was returned after programmes. He kept records, supported member welfare, and helped resolve internal issues quietly and professionally. During handover, every asset was accounted for, documents were organised, and internal systems were clear. He left with pride, knowing he had strengthened the foundation.</p>
                    <p>The second Director, <strong>Ngozi</strong>, took the role lightly. She did not document assets, ignored internal coordination, and rarely followed up on equipment. Items went missing, meetings became disorganised, and welfare issues were neglected. When her term ended, there were no records, no inventory, and many unanswered questions. She handed over with discomfort, leaving confusion behind.</p>
                    <p><strong>The Outcomes:</strong></p>
                    <ul><li>Ibrahim's path brought order, accountability, and continuity. His work made leadership easier for everyone else.</li>
                    <li>Ngozi's path brought loss, disorder, and frustration. Her carelessness weakened the organisation.</li></ul>
                    <p><strong>The Lesson:</strong> This office is not minor. It is central. When assets are protected and internal systems are strong, UDUF Africa thrives. Choose the path of Ibrahim. Be diligent, organised, and dependable.</p>
                    <p><em>Protect resources. Strengthen systems. Build legacy.</em></p>
                </div>
            </div>`
        },
        {
            title: "Five Pillars of Leadership",
            content: `<div class="course-text">
                <h3>Your Five Pillars of Leadership (Director of Assets & Internal Affairs)</h3>
                <div class="highlight-box"><h4>1. Asset Management</h4><p>Maintain a clear inventory of all organizational assets. Track usage, condition, and location of items. Ensure assets are returned, repaired, or replaced when necessary.</p><p><strong>Daily Reminder:</strong> What is not tracked will be lost.</p></div>
                <div class="highlight-box"><h4>2. Internal Coordination</h4><p>Support harmony among executives and members. Help resolve internal issues calmly and professionally. Ensure smooth flow of information within the organisation.</p><p><strong>Daily Reminder:</strong> Strong internal systems create strong external impact.</p></div>
                <div class="highlight-box"><h4>3. Responsibility and Accountability</h4><p>Keep proper records and submit reports. Take ownership of assigned duties. Ensure transparency in handling organisational resources.</p><p><strong>Daily Reminder:</strong> Accountability builds trust and protects integrity.</p></div>
                <div class="highlight-box"><h4>4. Welfare and Discipline</h4><p>Support member welfare initiatives. Promote orderliness, respect, and organisational standards. Address internal concerns early before they grow.</p><p><strong>Daily Reminder:</strong> People perform better where care and structure exist.</p></div>
                <div class="highlight-box"><h4>5. Continuity and Documentation</h4><p>Document assets, procedures, and internal arrangements. Prepare proper handover notes for successors. Preserve institutional memory.</p><p><strong>Daily Reminder:</strong> You are building systems, not just serving a term.</p></div>
            </div>`
        },
        {
            title: "Challenges & Your Leadership Challenge",
            content: `<div class="course-text">
                <h3>Common Challenges and How to Overcome Them</h3>
                <ul><li><strong>Missing or Damaged Assets:</strong> Create an asset register. Label items. Track usage. Require sign-out and sign-in.</li>
                <li><strong>Poor Record Keeping:</strong> Use simple notebooks or digital files. Update regularly. Keep copies.</li>
                <li><strong>Internal Conflicts:</strong> Listen calmly. Stay neutral. Report serious issues to the President. Encourage dialogue.</li>
                <li><strong>Lack of Cooperation from Members:</strong> Communicate clearly. Build relationships. Lead with respect and firmness.</li>
                <li><strong>Overwhelm from Multiple Responsibilities:</strong> Prioritise tasks. Delegate where necessary. Work closely with your Assistant Director.</li></ul>
                <h3>Your Leadership Challenge</h3>
                <p>Every asset you protect, every record you keep, and every system you strengthen builds UDUF Africa's foundation. Lead with diligence, organise with purpose, and ensure that what you build today serves generations to come.</p>
                <p><strong>Motto to Remember:</strong><br>Get Inspired. Take Action. Transform Africa.</p>
            </div>`
        }
    ];

    const quizQuestions = [
        { text: "The primary role of the Director of Assets & Internal Affairs is to:", options: ["Handle media activities", "Manage finances only", "Protect assets and strengthen internal systems", "Organise external events"], correct: 2 },
        { text: "True or False: Asset records are optional if items are few.", options: ["True", "False"], correct: 1 },
        { text: "Which of these best supports accountability?", options: ["Guessing asset numbers", "Verbal agreements only", "Proper documentation and reporting", "Ignoring missing items"], correct: 2 },
        { text: "Internal coordination mainly helps to:", options: ["Create confusion", "Reduce teamwork", "Strengthen harmony and effectiveness", "Delay projects"], correct: 2 },
        { text: "True or False: Welfare of members is part of internal affairs.", options: ["True", "False"], correct: 0 },
        { text: "What should you do when an asset goes missing?", options: ["Ignore it", "Replace quietly", "Document and report appropriately", "Blame volunteers"], correct: 2 },
        { text: "Continuity means:", options: ["Ending work with your term", "Leaving without records", "Preparing proper handover and documentation", "Starting afresh every time"], correct: 2 },
        { text: "A successful Director of Assets & Internal Affairs leaves behind:", options: ["Confusion", "Missing items", "Clear records and organised systems", "Complaints"], correct: 2 },
        { text: "True or False: Your role affects the credibility of UDUF Africa.", options: ["True", "False"], correct: 0 },
        { text: "Your leadership legacy is best measured by:", options: ["Popularity", "Length of service", "Impact, order, and accountability", "Personal benefits"], correct: 2 }
    ];

    // State
    let currentPage = 0;
    let moduleCompleted = false;
    let moduleQuizPassed = false;
    let userEmail = null;
    let userName = null;
    let quizAnswers = [];

    // Page functions (same pattern as previous pages)
    function loadPage() {
        if (moduleCompleted) {
            document.getElementById('pageContent').innerHTML = `
                <div class="module-complete">
                    <i class="fas fa-check-circle"></i>
                    <h3>Course Completed!</h3>
                    <p>You have successfully completed the Director of Assets & Internal Affairs course. Well done!</p>
                    <button class="complete-module-btn" onclick="goToCertificate()"><i class="fas fa-certificate"></i> Get Your Certificate</button>
                    <p style="margin-top:15px;"><a href="executive-leadership-academy.html" style="color:#27ae60;">Return to Academy Hub</a></p>
                </div>
            `;
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('pageNavigation').style.display = 'none';
            return;
        }
        if (moduleQuizPassed) {
            moduleCompleted = true;
            saveModuleCompletion();
            loadPage();
            return;
        }
        const page = pages[currentPage];
        document.getElementById('pageContent').innerHTML = `
            <div class="course-text">
                <div style="margin-bottom:20px;"><span style="background:#f39c12; color:white; padding:5px 12px; border-radius:20px;">Page ${currentPage+1} of ${pages.length}</span></div>
                ${page.content}
            </div>
        `;
        updatePageNavigation();
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        if (currentPage === pages.length - 1) {
            document.getElementById('nextPageBtn').innerHTML = 'Take Quiz <i class="fas fa-question-circle"></i>';
        } else {
            document.getElementById('nextPageBtn').innerHTML = 'Next Page <i class="fas fa-arrow-right"></i>';
        }
        updateOutline();
        updateOverallProgress();
        saveProgress();
    }

    function updatePageNavigation() {
        const nav = document.getElementById('pageNavigation');
        let html = '';
        for (let i=0; i<pages.length; i++) {
            let cls = '';
            if (i < currentPage) cls = 'completed';
            if (i === currentPage) cls = 'active';
            html += `<div class="page-dot ${cls}" onclick="goToPage(${i})">${i+1}</div>`;
        }
        nav.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadPage(); }

    function startQuiz() {
        document.getElementById('pageContent').innerHTML = renderQuiz();
        document.getElementById('navButtons').style.display = 'none';
        document.getElementById('pageNavigation').style.display = 'none';
    }

    function renderQuiz() {
        let html = `<div class="quiz-container"><h3><i class="fas fa-question-circle"></i> Director of Assets & Internal Affairs Knowledge Quiz</h3><p>Answer all questions correctly to complete the course. You need 80% to pass.</p>`;
        quizQuestions.forEach((q, idx) => {
            const saved = quizAnswers[idx];
            html += `<div class="quiz-question"><h4>${idx+1}. ${q.text}</h4><div class="quiz-options">`;
            q.options.forEach((opt, optIdx) => {
                let extra = '';
                if (saved !== undefined) {
                    if (optIdx === q.correct) extra = 'correct-answer';
                    else if (optIdx === saved && saved !== q.correct) extra = 'wrong-answer';
                }
                html += `<div class="quiz-option ${extra}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                            <input type="radio" name="q${idx}" ${saved===optIdx ? 'checked' : ''} ${saved!==undefined ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65+optIdx)}. ${opt}</label>
                         </div>`;
            });
            if (saved !== undefined) {
                const correct = (saved === q.correct);
                html += `<div class="answer-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
                            <i class="fas ${correct ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${correct ? ' Correct!' : ` Wrong! The correct answer is: ${q.options[q.correct]}`}
                         </div>`;
            }
            html += `</div></div>`;
        });
        const allAnswered = quizQuestions.every((_,i) => quizAnswers[i] !== undefined);
        if (allAnswered) {
            const correctCount = quizQuestions.filter((q,i) => quizAnswers[i] === q.correct).length;
            const percentage = (correctCount/quizQuestions.length)*100;
            const passed = percentage >= 80;
            html += `<div style="margin-top:30px; padding:20px; background:${passed?'#e8f5e9':'#fee'}; border-radius:15px; text-align:center;">
                        <h3>Your Score: ${correctCount}/${quizQuestions.length} (${percentage}%)</h3>
                        ${passed ? '<p style="color:#27ae60;">Congratulations! You passed!</p><button class="complete-module-btn" onclick="completeCourse()">Complete Course</button>' : '<p style="color:#e74c3c;">You need 80% to pass. Please review and try again.</p><button class="complete-module-btn" onclick="resetQuiz()" style="background:#f39c12;">Retake Quiz</button>'}
                     </div>`;
        }
        return html;
    }

    window.selectQuizAnswer = function(qIdx, ansIdx) {
        if (quizAnswers[qIdx] !== undefined) return;
        quizAnswers[qIdx] = ansIdx;
        saveQuizProgress();
        document.getElementById('pageContent').innerHTML = renderQuiz();
    };

    function resetQuiz() { quizAnswers = []; document.getElementById('pageContent').innerHTML = renderQuiz(); }
    function completeCourse() { moduleQuizPassed = true; saveModuleCompletion(); loadPage(); }
    function goToCertificate() { window.location.href = "certificates.html"; }

    function updateOverallProgress() {
        let percent = 0;
        if (moduleCompleted) percent = 100;
        else if (moduleQuizPassed) percent = 100;
        else percent = (currentPage / pages.length) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressBar').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        document.getElementById('progressSection').style.display = 'block';
    }

    function updateOutline() {
        let html = `<div class="module-outline"><div class="module-header expanded"><span>Director of Assets & Internal Affairs Course</span><i class="fas fa-chevron-down"></i></div><div class="module-pages show">`;
        pages.forEach((page, idx) => {
            let statusClass = '';
            let statusIcon = '<i class="far fa-circle"></i>';
            if (idx < currentPage) { statusClass = 'completed'; statusIcon = '<i class="fas fa-check-circle" style="color:#27ae60;"></i>'; }
            else if (idx === currentPage) { statusClass = 'current'; statusIcon = '<i class="fas fa-play-circle" style="color:#f39c12;"></i>'; }
            html += `<div class="page-outline-item ${statusClass}" onclick="jumpToPage(${idx})">${statusIcon} Page ${idx+1}: ${page.title}</div>`;
        });
        html += `<div class="page-outline-item ${moduleQuizPassed?'completed':(moduleCompleted?'completed':'')}" onclick="jumpToQuiz()">${moduleQuizPassed?'<i class="fas fa-check-circle" style="color:#27ae60;"></i>':'<i class="far fa-question-circle"></i>'} Quiz</div>`;
        html += `</div></div>`;
        document.getElementById('outlineList').innerHTML = html;
    }

    window.jumpToPage = function(page) { currentPage = page; loadPage(); toggleOutline(); };
    window.jumpToQuiz = function() { if (!moduleCompleted && !moduleQuizPassed) startQuiz(); toggleOutline(); };
    window.toggleOutline = function() { document.getElementById('outlineModal').classList.toggle('show'); };

    // Firebase save/load
    async function saveProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_assets`;
            await db.collection('progress').doc(progressId).set({
                userId: userEmail,
                courseId: "director_assets",
                currentPage: currentPage,
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveQuizProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_assets`;
            await db.collection('progress').doc(progressId).set({
                quizAnswers: quizAnswers,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function saveModuleCompletion() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_assets`;
            await db.collection('progress').doc(progressId).set({
                moduleCompleted: moduleCompleted,
                moduleQuizPassed: moduleQuizPassed,
                completed: moduleCompleted,
                lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }

    async function loadProgress() {
        if (!userEmail) return;
        try {
            const progressId = `${userEmail.replace(/[.#$/[\]]/g, '_')}_director_assets`;
            const doc = await db.collection('progress').doc(progressId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.currentPage !== undefined) currentPage = data.currentPage;
                if (data.moduleCompleted !== undefined) moduleCompleted = data.moduleCompleted;
                if (data.moduleQuizPassed !== undefined) moduleQuizPassed = data.moduleQuizPassed;
                if (data.quizAnswers) quizAnswers = data.quizAnswers;
                showToast("Progress loaded");
            }
        } catch(e) { console.error(e); }
        loadPage();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // User auth
    function checkUserSession() {
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedName = sessionStorage.getItem('userName');
        if (storedEmail && storedName) {
            userEmail = storedEmail;
            userName = storedName;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = userEmail;
            loadProgress();
        } else {
            showEmailModal();
        }
    }

    function showEmailModal() {
        const modalHtml = `
            <div class="email-modal" id="emailModal">
                <div class="email-modal-content">
                    <i class="fas fa-envelope"></i>
                    <h3>Enter Your Email to Continue</h3>
                    <p>Your progress will be saved to this email</p>
                    <input type="email" id="userEmailInput" placeholder="your@email.com" required>
                    <input type="text" id="userNameInput" placeholder="Full Name" required>
                    <button onclick="saveUser()">Start Learning</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.saveUser = async function() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value;
        if (!email || !name) { alert('Please enter both name and email'); return; }
        userEmail = email;
        userName = name;
        sessionStorage.setItem('userEmail', userEmail);
        sessionStorage.setItem('userName', userName);
        await db.collection('users').doc(userEmail).set({
            name: userName,
            email: userEmail,
            enrolledCourses: firebase.firestore.FieldValue.arrayUnion('director_assets'),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('emailModal').remove();
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmailDisplay').textContent = userEmail;
        loadProgress();
    };

    window.logout = function() {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage === pages.length - 1) startQuiz();
        else if (currentPage < pages.length - 1) { currentPage++; loadPage(); }
    });
    document.getElementById('outlineModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

    document.addEventListener('DOMContentLoaded', checkUserSession);
</script>
</body>
</html>
